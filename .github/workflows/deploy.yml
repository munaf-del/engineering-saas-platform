name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "infra/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_migrations:
        description: "Skip Prisma migrations"
        required: false
        type: boolean
        default: false

env:
  REGION: australia-southeast1
  REGISTRY: australia-southeast1-docker.pkg.dev

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  set-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      project_id: ${{ steps.env.outputs.project_id }}
    steps:
      - id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "project_id=engplatform-${ENV}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: [set-env]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            context: .
          - service: api
            dockerfile: apps/api/Dockerfile
            context: .
          - service: calc-engine
            dockerfile: apps/calc-engine/Dockerfile
            context: apps/calc-engine
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push
        run: |
          TAG="${{ github.sha }}"
          REPO="${{ env.REGISTRY }}/${{ needs.set-env.outputs.project_id }}/engplatform"
          IMAGE="${REPO}/${{ matrix.service }}"

          docker build \
            -f ${{ matrix.dockerfile }} \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            --cache-from "${IMAGE}:latest" \
            ${{ matrix.context }}

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  migrate:
    name: Run migrations
    needs: [set-env, build-and-push]
    if: ${{ !inputs.skip_migrations }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run Prisma migrations via Cloud Build
        run: |
          gcloud builds submit \
            --project=${{ needs.set-env.outputs.project_id }} \
            --config=deployment/cloudbuild/cloudbuild-migrate.yaml \
            --substitutions=_ENVIRONMENT=${{ needs.set-env.outputs.environment }} \
            --no-source \
            --quiet

  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [set-env, build-and-push, migrate]
    if: ${{ !cancelled() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    strategy:
      matrix:
        include:
          - service: web
            cloud_run_name: engplatform-web
          - service: api
            cloud_run_name: engplatform-api
          - service: calc-engine
            cloud_run_name: engplatform-calc-engine
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          TAG="${{ github.sha }}"
          REPO="${{ env.REGISTRY }}/${{ needs.set-env.outputs.project_id }}/engplatform"

          gcloud run deploy ${{ matrix.cloud_run_name }} \
            --image "${REPO}/${{ matrix.service }}:${TAG}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet

  post-deploy:
    name: Verify deployment
    needs: [set-env, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Health check (API)
        run: |
          echo "Waiting 30s for services to stabilise..."
          sleep 30
          # Health check would go here once URLs are known
          echo "Deployment to ${{ needs.set-env.outputs.environment }} complete."
