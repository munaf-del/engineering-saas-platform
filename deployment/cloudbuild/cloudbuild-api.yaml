# Cloud Build: Build and push the API image, run Prisma migrations
# Trigger: push to main, changes in apps/api/** or packages/shared/**

substitutions:
  _REGION: australia-southeast1
  _REPO: engplatform
  _SERVICE: api
  _ENVIRONMENT: dev

steps:
  # Build the API Docker image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  # Push images to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  # Run Prisma migrations (Cloud SQL via proxy)
  - id: migrate
    name: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
    entrypoint: npx
    args: ["prisma", "migrate", "deploy"]
    secretEnv: ["DATABASE_URL"]
    waitFor: ["push"]

  # Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - engplatform-api
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --quiet
    waitFor: ["migrate"]

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/engplatform-${_ENVIRONMENT}-database-url/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
