# Cloud Deploy delivery pipeline: dev → staging → prod
# Apply with:
#   gcloud deploy apply --file=deployment/clouddeploy/clouddeploy.yaml --region=australia-southeast1

apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: engplatform-pipeline
description: EngPlatform deployment pipeline
serialPipeline:
  stages:
    - targetId: engplatform-dev
      profiles: [dev]
      strategy:
        standard:
          verify: false
    - targetId: engplatform-staging
      profiles: [staging]
      strategy:
        standard:
          verify: true
    - targetId: engplatform-prod
      profiles: [prod]
      strategy:
        standard:
          verify: true
---
# ── Targets ──────────────────────────────────────────────────────────────────

apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: engplatform-dev
description: Development environment
run:
  location: projects/engplatform-dev/locations/australia-southeast1
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: engplatform-staging
description: Staging environment
run:
  location: projects/engplatform-staging/locations/australia-southeast2
requireApproval: false
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: engplatform-prod
description: Production environment
run:
  location: projects/engplatform-prod/locations/australia-southeast1
requireApproval: true
