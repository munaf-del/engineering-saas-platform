# Cloud Run service manifest for Cloud Deploy (dev)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: engplatform-web
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      serviceAccountName: engplatform-web@engplatform-dev.iam.gserviceaccount.com
      containers:
        - image: web
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
